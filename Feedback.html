<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css"> 
</head>
<body>

<header style="background-color:maroon; text-align:center; padding:20px; color:white;">
  <marquee behavior="alternate" scrollamount="8">
    <h1 style="font-family: Elephant, serif;">FEEDBACK FORM</h1>
  </marquee>
</header>

<section style="max-width:600px; margin:auto; padding:20px;">
  <form action="https://formspree.io/f/mdavzgzq" method="POST" style="display:flex; flex-direction:column; gap:15px;">
    
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required 
           style="padding:8px; border-radius:6px; border:1px solid #ccc;">
    
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required 
           style="padding:8px; border-radius:6px; border:1px solid #ccc;">
    
    <label for="feedback">Your Feedback:</label>
    <textarea id="feedback" name="feedback" rows="5" placeholder="Write your feedback here..." required 
              style="padding:8px; border-radius:6px; border:1px solid #ccc;"></textarea>
    
    <label>Rate our site:</label>
    <div>
      <input type="radio" id="rate1" name="rating" value="1"><label for="rate1">1</label>
      <input type="radio" id="rate2" name="rating" value="2"><label for="rate2">2</label>
      <input type="radio" id="rate3" name="rating" value="3"><label for="rate3">3</label>
      <input type="radio" id="rate4" name="rating" value="4"><label for="rate4">4</label>
      <input type="radio" id="rate5" name="rating" value="5"><label for="rate5">5</label>
    </div>
    
    <button type="submit" 
            style="background-color:maroon; color:white; padding:10px; border:none; border-radius:6px; font-weight:bold;">
      Submit
    </button>
  </form>
</section>

<section style="text-align:center; margin-top:20px;">
  <a href="index.html" 
     style="background-color:lightblue; color:navy; padding:10px 20px; 
            text-decoration:none; border-radius:6px; font-weight:bold;">
    Back to Home
  </a>
</section>

<footer style="background-color:lightgray; text-align:center; padding:10px; font-size:12px; font-family: Arial, sans-serif;">
  <p>&copy; 2026 Nurul Nazrin | Feedback Page</p>
</footer>

</body>
</html>
